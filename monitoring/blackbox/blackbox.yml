modules:
  http_2xx:
    # Обычная HTTP-проверка: Blackbox делает запрос и ждет успешный 2xx ответ.
    prober: http
    timeout: 10s
    http:
      # Принудительно IPv4, потому что в лабораторной сети IPv6 может мешать проверкам.
      preferred_ip_protocol: ip4

  http_2xx_insecure:
    # Такой же HTTP-prober, но ниже отключена строгая проверка TLS-сертификата.
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      tls_config:
        # Только для учебного проблемного сайта, в реальной жизни так лучше не делать.
        insecure_skip_verify: true
