apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -c -f compose.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: blackbox
  name: blackbox
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: blackbox
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -c -f compose.yml
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: blackbox
    spec:
      containers:
        - args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
          image: prom/blackbox-exporter
          name: blackbox
          ports:
            - containerPort: 9115
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/blackbox_exporter
              name: blackbox-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: blackbox-cm0
          name: blackbox-cm0
