apiVersion: apps/v1
# Grafana визуализирует метрики из автоматически подключённого Prometheus.
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -c -f compose.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: grafana
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -c -f compose.yml
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: grafana
    spec:
      containers:
        - env:
            # Пароль задаётся через values.yaml.
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "{{ .Values.GF_ADMIN_PASSWORD }}"
            - name: GF_SECURITY_ADMIN_USER
              value: admin
          image: grafana/grafana
          name: grafana
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            # ConfigMap подключает datasource, PVC сохраняет данные Grafana.
            - mountPath: /etc/grafana/provisioning/datasources
              name: grafana-cm0
            - mountPath: /var/lib/grafana
              name: grafana-data
      restartPolicy: Always
      volumes:
        - configMap:
            name: grafana-cm0
          name: grafana-cm0
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
