apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -c -f compose.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: blackbox
  name: blackbox
spec:
  # LoadBalancer открывает UI exporter через minikube tunnel.
  type: LoadBalancer
  ports:
    - name: "9115"
      port: 9115
      targetPort: 9115
  selector:
    io.kompose.service: blackbox
