apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

# Все имена ресурсов получат префикс prod-.
namePrefix: prod-

# Отдельный label изолирует prod-селекторы от dev.
labels:
  - includeSelectors: true
    pairs:
      env: prod

# Первый патч задаёт prod-параметры Deployment, второй меняет порт Service.
patches:
  - path: flask-deployment-patch.yaml
  - target:
      version: v1
      kind: Service
      name: service-devops
    path: flask-service-port-patch.yaml
