apiVersion: v1
# Service дает стабильный адрес для группы Pod с Flask.
kind: Service

metadata:
  name: service-devops
  labels:
    app: flask-app

spec:
  # LoadBalancer нужен для доступа к приложению снаружи кластера.
  type: LoadBalancer

  # Service отправляет трафик только в Pod с такими labels.
  selector:
    app: flask-app
    svc: front

  ports:
    - name: http
      protocol: TCP
      # Порт Service: к нему обращаемся снаружи или через port-forward.
      port: 8000
      # Порт контейнера Flask внутри Pod.
      targetPort: 5000

  # Явно указываю внешний IP, который должен принимать этот Service.
  externalIPs:
    - 10.0.22.2
